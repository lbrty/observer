{{- $src := .Get "src" -}}
{{- $alt := .Get "alt" | default "" -}}
{{- $class := .Get "class" | default "" -}}
{{- $r := resources.Get $src -}}
{{- if $r -}}
  {{- $webp := $r.Resize "1440x webp q85" -}}
  <img src="{{ $webp.RelPermalink }}" alt="{{ $alt }}" class="{{ $class }}" loading="lazy" decoding="async" width="{{ $webp.Width }}" height="{{ $webp.Height }}">
{{- else -}}
  {{- errorf "screenshot shortcode: image not found: %s" $src -}}
{{- end -}}
