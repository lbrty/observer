paths:
  /admin/categories:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: List of categories
          schema:
            type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List all categories
      tags:
      - admin-categories
    post:
      consumes:
      - application/json
      parameters:
      - description: Category payload
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_lbrty_observer_internal_usecase_admin.CreateCategoryInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_lbrty_observer_internal_usecase_admin.CategoryDTO'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create a new category
      tags:
      - admin-categories
  /admin/categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_handler.MessageResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_handler.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete a category
      tags:
      - admin-categories
    get:
      parameters:
      - description: Category ID
        in: path
